AWSTemplateFormatVersion: 2010-09-09

Description: Automate EC2 instance start and stop using EventBridge Scheduler (starts at 08:00 UTC, stops at 20:00 UTC on weekdays)

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 Instance Type
    AllowedValues:
      - t3.micro
      - t2.micro
  ImageId:
    Type: AWS::EC2::Image::Id
    Default: ami-0d1b55a6d77a0c326 # Amazon Linux 2 AMI ID for eu-west-1 (Ireland)
    Description: Latest Amazon Linux 2 AMI ID
  Timezone:
    Type: String
    Default: GMT # UTC
    Description: Timezone for the schedule (e.g., UTC, America/New_York)
    AllowedValues:
      - UTC
      - GMT
      - US/Eastern
      - America/New_York
      - Europe/London
      - Europe/Ireland
      - Asia/Tokyo
      - Australia/Sydney
    
Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref ImageId
      InstanceType: !Ref InstanceType
      Tags:
        - Key: Name
          Value: ScheduledInstance

  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: EventBridgeSchedulerEC2Role
      Description: IAM Role for EventBridge Scheduler to start and stop EC2 instances
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AllowEC2StartStop
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:StopInstances
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${EC2Instance}"

  StartInstanceSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: EC2StartInstanceSchedule
      Description: Start EC2 instance at 08:00 UTC Monday-Friday
      ScheduleExpression: cron(0 8 ? * MON-FRI *) # 08:00 UTC Monday-Friday
      ScheduleExpressionTimezone: !Ref Timezone
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: "arn:aws:scheduler:::aws-sdk:ec2:startInstances"
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: !Sub |
          {
            "InstanceIds": ["${EC2Instance}"]
          }
        RetryPolicy:
          MaximumRetryAttempts: 2

  StopInstanceSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: EC2StopInstanceSchedule
      Description: Stop EC2 instance at 20:00 UTC Monday-Friday
      ScheduleExpression: cron(0 20 ? * MON-FRI *) # 20:00 UTC Monday-Friday
      ScheduleExpressionTimezone: !Ref Timezone
      FlexibleTimeWindow:
        Mode: "OFF"
      State: ENABLED
      Target:
        Arn: "arn:aws:scheduler:::aws-sdk:ec2:stopInstances"
        RoleArn: !GetAtt SchedulerRole.Arn
        Input: !Sub |
          {
            "InstanceIds": ["${EC2Instance}"]
          }
        RetryPolicy:
          MaximumRetryAttempts: 2

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
  # PublicIp:
  #   Description: Public IP of EC2 Instance
  #   Value: !GetAtt EC2Instance.PublicIp
  StartScheduleName:
    Description: Name of the start schedule
    Value: !Ref StartInstanceSchedule
  StopScheduleName:
    Description: Name of the stop schedule
    Value: !Ref StopInstanceSchedule
  SchedulerRoleArn:
    Description: ARN of the Scheduler IAM Role
    Value: !GetAtt SchedulerRole.Arn
