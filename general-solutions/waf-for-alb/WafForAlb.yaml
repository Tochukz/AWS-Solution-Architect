AWSTemplateFormatVersion: "2010-09-09"

Description: Native AWS WAF rate limiting for ALB on a protected URI path

Parameters:
  WebAclName:
    Type: String
    Default: SimpleWebAcl
    Description: Name of the WAFv2 Web ACL
  ProtectedPath:
    Type: String
    Default: /auth/login
    Description: URI path to apply the native rate limit rule to

Resources:
  MyWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Ref WebAclName
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${WebAclName}Metric"
      CustomResponseBodies:
        RateLimit429Body:
          ContentType: APPLICATION_JSON
          Content: '{"message":"Too Many Requests"}'
      Rules:
        - Name: NativeRateLimitOnProtectedPath
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: RateLimit429Body
                ResponseHeaders:
                  - Name: Retry-After
                    Value: "600"
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: 100
              EvaluationWindowSec: 600
              ScopeDownStatement:
                ByteMatchStatement:
                  SearchString: !Ref ProtectedPath
                  FieldToMatch:
                    UriPath: {}
                  PositionalConstraint: EXACTLY
                  TextTransformations:
                    - Priority: 0
                      Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${WebAclName}NativeRateLimitMetric"

  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !ImportValue ALB-LoadBalancerArn
      WebACLArn: !GetAtt MyWebACL.Arn

Outputs:
  WebAclArn:
    Description: ARN of the WAF Web ACL
    Value: !GetAtt MyWebACL.Arn 