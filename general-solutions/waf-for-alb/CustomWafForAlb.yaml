AWSTemplateFormatVersion: "2010-09-09"

Description: >
  WAFv2 Web ACL for an Application Load Balancer with fine-grained per-IP rate
  limiting (5 requests / 15 minutes) on /auth/login, enforced by a Lambda
  function backed by DynamoDB. IPs that exceed the threshold are blocked via a
  dynamically updated WAF IP set for IPv4 clients.

Parameters:
  WebAclName:
    Type: String
    Default: SimpleWebAcl
    Description: Name of the WAFv2 Web ACL
  ProtectedPath:
    Type: String
    Default: /auth/login
    Description: URI path to apply the 5 req / 15 min rate limit to
  # LoadBalancerArn:
  #   Type: String
  #   Description: ARN of the Application Load Balancer to protect

Resources:
  # ── Blocked IP sets (populated dynamically by Lambda) ─────────────────────
  BlockedIPv4Set:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: !Sub "${WebAclName}-blocked-ipv4"
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses: []

  # ── Web ACL ────────────────────────────────────────────────────────────────
  MyWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Ref WebAclName
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${WebAclName}Metric"
      CustomResponseBodies:
        RateLimit429Body:
          ContentType: APPLICATION_JSON
          Content: '{"message":"Too Many Requests"}'
      Rules:
        - Name: BlockedIPv4Rule
          Priority: 0
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
                CustomResponseBodyKey: RateLimit429Body
                ResponseHeaders:
                  - Name: Retry-After
                    Value: "900"
          Statement:
            AndStatement:
              Statements:
                - IPSetReferenceStatement:
                    Arn: !GetAtt BlockedIPv4Set.Arn
                - ByteMatchStatement:
                    SearchString: !Ref ProtectedPath
                    FieldToMatch:
                      UriPath: {}
                    PositionalConstraint: EXACTLY
                    TextTransformations:
                      - Priority: 0
                        Type: NONE
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${WebAclName}BlockedIPv4Metric"

  # ── WAF logging → CloudWatch Logs ─────────────────────────────────────────
  WafLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "aws-waf-logs-${WebAclName}"
      RetentionInDays: 7

  # Resource policy that lets the WAF delivery service write to the log group
  WafLogGroupPolicy:
    Type: AWS::Logs::ResourcePolicy
    Properties:
      PolicyName: !Sub "${WebAclName}-waf-log-policy"
      PolicyDocument: !Sub |
        {
          "Version": "2012-10-17",
          "Statement": [{
            "Effect": "Allow",
            "Principal": { "Service": "delivery.logs.amazonaws.com" },
            "Action": ["logs:CreateLogStream", "logs:PutLogEvents"],
            "Resource": "${WafLogGroup.Arn}:*",
            "Condition": {
              "StringEquals": { "aws:SourceAccount": "${AWS::AccountId}" }
            }
          }]
        }

  WafLoggingConfig:
    Type: AWS::WAFv2::LoggingConfiguration
    DependsOn: WafLogGroupPolicy
    Properties:
      ResourceArn: !GetAtt MyWebACL.Arn
      LogDestinationConfigs:
        - !GetAtt WafLogGroup.Arn

  # ── DynamoDB: per-IP request counter with fixed-window TTL ────────────────
  RequestCountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${WebAclName}-ip-request-counts"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ip
          AttributeType: S
      KeySchema:
        - AttributeName: ip
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  BlockedIpExpiryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${WebAclName}-blocked-ip-expiry"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ip
          AttributeType: S
      KeySchema:
        - AttributeName: ip
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── IAM role for Lambda ────────────────────────────────────────────────────
  RateLimiterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RateLimiterPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt RequestCountTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource: !GetAtt BlockedIpExpiryTable.Arn
              - Effect: Allow
                Action:
                  - wafv2:GetIPSet
                  - wafv2:UpdateIPSet
                Resource:
                  - !GetAtt BlockedIPv4Set.Arn

  # ── Lambda: reads WAF logs, blocks IPs that exceed 5 req / 15 min ─────────
  RateLimiterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${WebAclName}-rate-limiter"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RateLimiterRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME:      !Ref RequestCountTable
          BLOCKED_TABLE_NAME: !Ref BlockedIpExpiryTable
          IPV4_SET_ID:     !GetAtt BlockedIPv4Set.Id
          IPV4_SET_NAME:   !Sub "${WebAclName}-blocked-ipv4"
          MAX_REQUESTS:    "5"
          WINDOW_SECONDS:  "900"
          PROTECTED_PATH:  !Ref ProtectedPath
      Code:
        ZipFile: |
          import boto3, os, json, base64, gzip, time

          TABLE_NAME = os.environ['TABLE_NAME']
          BLOCKED_TABLE_NAME = os.environ['BLOCKED_TABLE_NAME']
          IPV4_SET_ID = os.environ['IPV4_SET_ID']
          IPV4_SET_NAME = os.environ['IPV4_SET_NAME']
          MAX_REQUESTS = int(os.environ['MAX_REQUESTS'])
          WINDOW_SECONDS = int(os.environ['WINDOW_SECONDS'])
          PROTECTED_PATH = os.environ['PROTECTED_PATH']
          REGION = os.environ['AWS_REGION']

          dynamodb = boto3.resource('dynamodb', region_name=REGION)
          wafv2 = boto3.client('wafv2', region_name=REGION)
          count_table = dynamodb.Table(TABLE_NAME)
          blocked_table = dynamodb.Table(BLOCKED_TABLE_NAME)

          def lambda_handler(event, context):
            try:
              raw = base64.b64decode(event['awslogs']['data'])
              records = json.loads(gzip.decompress(raw))
            except Exception as e:
              return {'statusCode': 400, 'body': f'Error decompressing logs: {e}'}

            block_v4 = set()

            for rec in records.get('logEvents', []):
              try:
                msg = json.loads(rec['message'])
              except (KeyError, json.JSONDecodeError):
                continue

              http_req = msg.get('httpRequest', {})
              if http_req.get('uri', '') != PROTECTED_PATH:
                continue

              ip = http_req.get('clientIp')
              if not ip:
                continue

              try:
                block_until = int(time.time()) + WINDOW_SECONDS
                resp = count_table.update_item(
                  Key={'ip': ip},
                  UpdateExpression=(
                    'SET #cnt = if_not_exists(#cnt, :zero) + :one, '
                    '#ttl = if_not_exists(#ttl, :ttl)'
                  ),
                  ExpressionAttributeNames={'#cnt': 'count', '#ttl': 'ttl'},
                  ExpressionAttributeValues={':one': 1, ':zero': 0, ':ttl': block_until},
                  ReturnValues='UPDATED_NEW'
                )
                count = int(resp['Attributes']['count'])

                if count > MAX_REQUESTS:
                  block_v4.add(ip)

                  blocked_table.put_item(
                    Item={
                      'ip': ip,
                      'ip_version': 'IPV4',
                      'ttl': block_until
                    }
                  )
              except Exception:
                continue

            if block_v4:
              _add_to_ip_set(IPV4_SET_NAME, IPV4_SET_ID, block_v4, '/32')

            return {'statusCode': 200, 'body': f'Blocked IPv4: {len(block_v4)}'}

          def _add_to_ip_set(name, set_id, ips, suffix):
            resp = wafv2.get_ip_set(Name=name, Scope='REGIONAL', Id=set_id)
            token = resp['LockToken']
            addrs = set(resp['IPSet']['Addresses'])
            new = addrs | {(ip if '/' in ip else ip + suffix) for ip in ips}
            if new != addrs:
              wafv2.update_ip_set(
                Name=name,
                Scope='REGIONAL',
                Id=set_id,
                LockToken=token,
                Addresses=list(new)
              )

  CleanupExpiredBlockedIpsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${WebAclName}-cleanup-expired-blocked-ips"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RateLimiterRole.Arn
      Timeout: 30
      Environment:
        Variables:
          BLOCKED_TABLE_NAME: !Ref BlockedIpExpiryTable
          IPV4_SET_ID:        !GetAtt BlockedIPv4Set.Id
          IPV4_SET_NAME:      !Sub "${WebAclName}-blocked-ipv4"
      Code:
        ZipFile: |
          import boto3, os, time
          from boto3.dynamodb.conditions import Attr

          BLOCKED_TABLE_NAME = os.environ['BLOCKED_TABLE_NAME']
          IPV4_SET_ID = os.environ['IPV4_SET_ID']
          IPV4_SET_NAME = os.environ['IPV4_SET_NAME']
          REGION = os.environ['AWS_REGION']

          dynamodb = boto3.resource('dynamodb', region_name=REGION)
          wafv2 = boto3.client('wafv2', region_name=REGION)
          blocked_table = dynamodb.Table(BLOCKED_TABLE_NAME)

          def lambda_handler(event, context):
            now = int(time.time())
            expired = []
            scan_kwargs = {
              'FilterExpression': Attr('ttl').lte(now),
              'ProjectionExpression': 'ip, ip_version'
            }

            while True:
              resp = blocked_table.scan(**scan_kwargs)
              expired.extend(resp.get('Items', []))
              last = resp.get('LastEvaluatedKey')
              if not last:
                break
              scan_kwargs['ExclusiveStartKey'] = last

            if not expired:
              return {'statusCode': 200, 'body': 'No expired blocked IPs'}

            expired_v4 = {item['ip'] for item in expired if item.get('ip_version') == 'IPV4'}

            if expired_v4:
              _remove_from_ip_set(IPV4_SET_NAME, IPV4_SET_ID, expired_v4, '/32')

            with blocked_table.batch_writer() as batch:
              for item in expired:
                batch.delete_item(Key={'ip': item['ip']})

            return {'statusCode': 200, 'body': f'Unblocked {len(expired)} IPs'}

          def _remove_from_ip_set(name, set_id, ips, suffix):
            resp = wafv2.get_ip_set(Name=name, Scope='REGIONAL', Id=set_id)
            token = resp['LockToken']
            current = set(resp['IPSet']['Addresses'])
            to_remove = {(ip if '/' in ip else ip + suffix) for ip in ips}
            updated = current - to_remove
            if updated != current:
              wafv2.update_ip_set(
                Name=name,
                Scope='REGIONAL',
                Id=set_id,
                LockToken=token,
                Addresses=list(updated)
              )

  CleanupExpiredBlockedIpsSchedule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: rate(1 minute)
      State: ENABLED
      Targets:
      - Arn: !GetAtt CleanupExpiredBlockedIpsFunction.Arn
        Id: CleanupExpiredBlockedIpsTarget

  CleanupExpiredBlockedIpsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CleanupExpiredBlockedIpsFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CleanupExpiredBlockedIpsSchedule.Arn

  # ── Allow CloudWatch Logs to invoke the Lambda ─────────────────────────────
  LambdaLogPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RateLimiterFunction.Arn
      Action: lambda:InvokeFunction
      Principal: logs.amazonaws.com
      SourceArn: !GetAtt WafLogGroup.Arn
      SourceAccount: !Ref AWS::AccountId

  # ── Subscription: stream WAF log group into Lambda ─────────────────────────
  WafLogSubscription:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn: LambdaLogPermission
    Properties:
      LogGroupName: !Ref WafLogGroup
      FilterPattern: ""
      DestinationArn: !GetAtt RateLimiterFunction.Arn

  # ── Associate the Web ACL with the ALB ────────────────────────────────────
  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn:  !ImportValue ALB-LoadBalancerArn # !Ref LoadBalancerArn
      WebACLArn: !GetAtt MyWebACL.Arn

Outputs:
  WebAclArn:
    Description: ARN of the WAF Web ACL
    Value: !GetAtt MyWebACL.Arn
  RateLimiterFunctionArn:
    Description: ARN of the rate limiter Lambda function
    Value: !GetAtt RateLimiterFunction.Arn
  RequestCountTableName:
    Description: DynamoDB table tracking per-IP request counts
    Value: !Ref RequestCountTable
  BlockedIpExpiryTableName:
    Description: DynamoDB table tracking blocked IP expiry
    Value: !Ref BlockedIpExpiryTable
  CleanupExpiredBlockedIpsFunctionArn:
    Description: ARN of scheduled cleanup Lambda
    Value: !GetAtt CleanupExpiredBlockedIpsFunction.Arn